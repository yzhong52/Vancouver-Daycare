<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GM16Z1VGT9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GM16Z1VGT9');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vancouver Daycare Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2c5f8a;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .birthday-form {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .birthday-form label {
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .birthday-form input[type="date"] {
      padding: 6px 10px;
      height: 36px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.4);
      font-size: 0.9rem;
      background: rgba(255,255,255,0.22);
      color: white;
      cursor: pointer;
      outline: none;
    }

    .birthday-form input[type="date"]:focus {
      outline: 2px solid rgba(255,255,255,0.6);
      outline-offset: 2px;
    }

    .birthday-form input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .clear-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
      height: 36px;
    }

    .clear-btn:hover { background: rgba(255,255,255,0.28); }

    .age-badge {
      background: #3a8fcf;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      white-space: nowrap;
      display: none;
    }

    .count {
      margin-left: auto;
      background: rgba(255,255,255,0.12);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    @media (max-width: 500px) {
      header { padding: 8px 12px; gap: 8px; }
      header h1 { width: 100%; }
      .count { margin-left: 0; }
    }

    #map { flex: 1; position: relative; }

    .map-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 24px 32px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      z-index: 1000;
      pointer-events: none;
      max-width: 280px;
      line-height: 1.5;
    }

    .map-overlay strong { display: block; color: #2c5f8a; margin-bottom: 6px; font-size: 1rem; }

    /* Popup */
    .popup {
      font-size: 0.875rem;
      line-height: 1.55;
      min-width: 240px;
      max-width: 300px;
    }
    .popup h3 { font-size: 0.95rem; margin-bottom: 2px; color: #2c5f8a; }
    .popup .neighbourhood { font-size: 0.75rem; color: #888; margin-bottom: 8px; }
    .popup .vacancy-box {
      background: #e8f0f8;
      border-left: 3px solid #2c5f8a;
      padding: 6px 8px;
      border-radius: 0 4px 4px 0;
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .popup .vacancy-box strong {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #2c5f8a;
      margin-bottom: 2px;
    }
    .popup table { width: 100%; border-collapse: collapse; }
    .popup td { padding: 2px 4px 2px 0; vertical-align: top; }
    .popup td:first-child {
      font-weight: 600; color: #555; white-space: nowrap;
      padding-right: 8px; font-size: 0.78rem;
    }
    .popup td:last-child { max-width: 160px; word-break: break-word; }
    .popup .truncate { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
    .popup a { color: #2c5f8a; }
    .popup .date-tag {
      display: inline-block;
      background: #f0f0f0;
      color: #666;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.72rem;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>Vancouver Daycare Finder</h1>
  <div class="birthday-form">
    <label for="birthday">Child's birthday:</label>
    <input type="date" id="birthday" max="">
    <button class="clear-btn" id="clear-btn" title="Clear filter">Clear</button>
  </div>
  <span class="age-badge" id="age-label"></span>
  <span class="count" id="count"></span>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const mapEl     = document.getElementById("map");
  const birthdayEl = document.getElementById("birthday");
  const clearBtn  = document.getElementById("clear-btn");
  const ageLabelEl = document.getElementById("age-label");
  const countEl   = document.getElementById("count");

  const map = L.map("map").setView([49.245, -123.13], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{ y}.png".replace("{ y}", "{y}"), {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  birthdayEl.max = new Date().toISOString().split("T")[0];

  // --- Helpers ---
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function safeHref(url) {
    return /^https?:\/\//i.test(url) ? url : `http://${url}`;
  }

  function ageInMonths(birthdayStr) {
    const now = new Date(), birth = new Date(birthdayStr);
    return (now.getFullYear() - birth.getFullYear()) * 12
         + (now.getMonth() - birth.getMonth())
         - (now.getDate() < birth.getDate() ? 1 : 0);
  }

  function formatAge(months) {
    if (months < 24) return `${months} month${months === 1 ? "" : "s"} old`;
    const yrs = Math.floor(months / 12), mo = months % 12;
    return mo > 0 ? `${yrs} yr ${mo} mo old` : `${yrs} years old`;
  }

  function providerMatchesAge(ageGroups, childMonths) {
    return ageGroups.split(";").map(s => s.trim()).some(g => {
      const mo = g.match(/^([\d.]+)\s*-\s*([\d.]+)\s*mo$/);
      if (mo) return childMonths >= +mo[1] && childMonths <= +mo[2];
      const yr = g.match(/^([\d.]+)\s*-\s*([\d.]+)\s*yrs?$/);
      if (yr) return childMonths >= Math.round(+yr[1] * 12) && childMonths <= Math.round(+yr[2] * 12);
      return false;
    });
  }

  function parseCSV(text) {
    const [headerLine, ...lines] = text.trim().split("\n");
    const headers = headerLine.split(",");
    return lines.map(line => {
      const values = [];
      let cur = "", inQuote = false;
      for (const ch of line) {
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === "," && !inQuote) { values.push(cur); cur = ""; }
        else { cur += ch; }
      }
      values.push(cur);
      return Object.fromEntries(headers.map((h, i) => [h, values[i] ?? ""]));
    });
  }

  function buildPopup(p) {
    const details = [
      p.age_groups ? ["Age groups", esc(p.age_groups)] : null,
      p.languages  ? ["Languages",  esc(p.languages)]  : null,
      p.curriculum ? ["Curriculum", esc(p.curriculum)] : null,
      ["Address",   esc(p.address)],
      p.phone   ? ["Phone",   `<a href="tel:${esc(p.phone)}">${esc(p.phone)}</a>`] : null,
      p.email   ? ["Email",   `<a class="truncate" href="mailto:${esc(p.email)}" title="${esc(p.email)}">${esc(p.email)}</a>`] : null,
      p.website ? ["Website", `<a href="${esc(safeHref(p.website))}" target="_blank" rel="noopener">Visit ↗</a>`] : null,
    ].filter(Boolean);

    return `
      <div class="popup">
        <h3>${esc(p.name)}</h3>
        <div class="neighbourhood">${esc(p.neighbourhood)}</div>
        <div class="vacancy-box">
          <strong>Vacancy</strong>
          ${esc(p.vacancies)}
        </div>
        <table>${details.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}</table>
        <span class="date-tag">Updated: ${esc(p.contact_date)}</span>
      </div>`;
  }

  // --- Overlay helper ---
  let overlayEl = null;
  function setOverlay(html) {
    if (overlayEl) overlayEl.remove();
    if (!html) { overlayEl = null; return; }
    overlayEl = document.createElement("div");
    overlayEl.className = "map-overlay";
    overlayEl.innerHTML = html;
    mapEl.appendChild(overlayEl);
  }

  // --- Markers ---
  let markerLayer = L.layerGroup().addTo(map);
  let allData = [];
  let initialBoundsFit = false;

  function renderMarkers(data) {
    markerLayer.clearLayers();

    const mappable = data
      .filter(p => p.lat && p.lng)
      .map(p => ({ p, lat: parseFloat(p.lat), lng: parseFloat(p.lng) }));

    if (data.length === 0) {
      setOverlay("<strong>No matches</strong>No daycares match this age group.");
    } else if (mappable.length === 0) {
      setOverlay("<strong>No map locations</strong>Matching providers found but none have known addresses.");
    } else {
      setOverlay(null);
    }

    mappable.forEach(({ p, lat, lng }) => {
      L.marker([lat, lng])
        .bindPopup(buildPopup(p), { maxWidth: 320 })
        .addTo(markerLayer);
    });

    countEl.textContent = `${data.length} provider${data.length !== 1 ? "s" : ""}`;

    if (mappable.length && !initialBoundsFit) {
      map.fitBounds(mappable.map(({ lat, lng }) => [lat, lng]), { padding: [40, 40] });
      initialBoundsFit = true;
    }
  }

  function applyFilter() {
    const val = birthdayEl.value;
    if (!val) {
      ageLabelEl.style.display = "none";
      clearBtn.style.display = "none";
      setOverlay("<strong>Enter your child's birthday</strong>Use the picker above to find matching daycares.");
      countEl.textContent = `${allData.length} provider${allData.length !== 1 ? "s" : ""}`;
      markerLayer.clearLayers();
      initialBoundsFit = false;
      renderMarkers(allData);
      return;
    }

    const months = ageInMonths(val);
    ageLabelEl.textContent = formatAge(months);
    ageLabelEl.style.display = "";
    clearBtn.style.display = "";

    const filtered = allData.filter(p => p.age_groups && providerMatchesAge(p.age_groups, months));
    renderMarkers(filtered);
  }

  birthdayEl.addEventListener("change", applyFilter);

  clearBtn.addEventListener("click", () => {
    birthdayEl.value = "";
    initialBoundsFit = false;
    applyFilter();
  });

  // --- Load ---
  setOverlay("Loading…");
  fetch("processed_data/geocoded_vacancies.csv")
    .then(r => {
      if (!r.ok) throw new Error("processed_data/geocoded_vacancies.csv not found — run geocode_vacancies.py first.");
      return r.text();
    })
    .then(text => {
      allData = parseCSV(text);
      applyFilter();
    })
    .catch(err => {
      setOverlay(`<strong>Error</strong>${esc(err.message)}`);
    });
</script>
</body>
</html>
